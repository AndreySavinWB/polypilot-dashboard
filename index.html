<!DOCTYPE html>\n<html lang="ru">\n<head>\n  <meta charset="UTF-8" />\n  <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n  <title>PolyPilot Dashboard</title>\n  <style>\n    :root {\n      --bg: #070b14;\n      --panel: #10182a;\n      --panel-2: #121d33;\n      --text: #e8eeff;\n      --muted: #9eb0d8;\n      --line: #25375f;\n      --neon-cyan: #1de9ff;\n      --neon-pink: #ff4dd2;\n      --neon-lime: #b7ff4a;\n      --danger: #ff5b77;\n      --shadow: 0 0 0 1px rgba(29, 233, 255, 0.18), 0 10px 30px rgba(0, 0, 0, 0.45);\n    }\n\n    * { box-sizing: border-box; }\n\n    body {\n      margin: 0;\n      font-family: Inter, Segoe UI, Roboto, sans-serif;\n      background: radial-gradient(circle at 20% 10%, #17284a 0%, var(--bg) 45%), var(--bg);\n      color: var(--text);\n      min-height: 100vh;\n    }\n\n    .container {\n      max-width: 1200px;\n      margin: 0 auto;\n      padding: 28px 20px 36px;\n    }\n\n    h1 {\n      margin: 0 0 18px;\n      font-size: clamp(1.5rem, 2vw, 2rem);\n      color: var(--neon-cyan);\n      text-shadow: 0 0 12px rgba(29, 233, 255, 0.45);\n    }\n\n    .controls, .new-task {\n      background: linear-gradient(160deg, rgba(255, 255, 255, 0.02), rgba(29, 233, 255, 0.04));\n      border: 1px solid var(--line);\n      border-radius: 14px;\n      padding: 14px;\n      box-shadow: var(--shadow);\n      margin-bottom: 16px;\n    }\n\n    .controls {\n      display: grid;\n      grid-template-columns: repeat(2, minmax(180px, 240px));\n      gap: 10px;\n    }\n\n    .new-task {\n      display: grid;\n      grid-template-columns: 2fr 1fr 1fr 1fr auto;\n      gap: 10px;\n      align-items: center;\n    }\n\n    label { font-size: 0.85rem; color: var(--muted); display:block; margin-bottom: 4px; }\n\n    input, select, button {\n      width: 100%;\n      background: var(--panel-2);\n      color: var(--text);\n      border: 1px solid var(--line);\n      border-radius: 10px;\n      padding: 10px 12px;\n      font-size: 0.95rem;\n    }\n\n    input:focus, select:focus {\n      outline: none;\n      border-color: var(--neon-cyan);\n      box-shadow: 0 0 0 2px rgba(29, 233, 255, 0.2);\n    }\n\n    button {\n      cursor: pointer;\n      border-color: rgba(255, 77, 210, 0.6);\n      background: linear-gradient(135deg, rgba(29, 233, 255, 0.18), rgba(255, 77, 210, 0.18));\n      color: #fff;\n      font-weight: 600;\n      transition: 0.2s ease;\n    }\n\n    button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255, 77, 210, 0.25); }\n\n    .board {\n      display: grid;\n      grid-template-columns: repeat(3, 1fr);\n      gap: 14px;\n    }\n\n    .column {\n      background: linear-gradient(170deg, rgba(29, 233, 255, 0.07), rgba(183, 255, 74, 0.04));\n      border: 1px solid var(--line);\n      border-radius: 16px;\n      min-height: 280px;\n      box-shadow: var(--shadow);\n      padding: 12px;\n    }\n\n    .column h2 {\n      margin: 6px 0 12px;\n      font-size: 1rem;\n      letter-spacing: 0.5px;\n      color: var(--neon-lime);\n    }\n\n    .task-list { display: grid; gap: 10px; }\n\n    .task-card {\n      background: var(--panel);\n      border: 1px solid #293b67;\n      border-radius: 12px;\n      padding: 10px;\n      display: grid;\n      gap: 8px;\n    }\n\n    .task-title { margin: 0; font-size: 0.95rem; }\n    .task-done .task-title { text-decoration: line-through; opacity: 0.6; }\n\n    .meta {\n      display: flex;\n      gap: 6px;\n      flex-wrap: wrap;\n      font-size: 0.78rem;\n      color: var(--muted);\n    }\n\n    .badge {\n      padding: 2px 8px;\n      border-radius: 999px;\n      border: 1px solid #355089;\n      background: #0f1b34;\n    }\n\n    .actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; }\n\n    .delete-btn {\n      width: auto;\n      padding: 6px 10px;\n      background: rgba(255, 91, 119, 0.15);\n      border-color: rgba(255, 91, 119, 0.5);\n      color: #ffd9e1;\n    }\n\n    .empty {\n      color: #6f82ad;\n      font-size: 0.9rem;\n      padding: 8px 2px;\n    }\n\n    @media (max-width: 1024px) {\n      .new-task { grid-template-columns: 1fr 1fr; }\n      .new-task .add-btn { grid-column: span 2; }\n      .controls { grid-template-columns: 1fr; }\n      .board { grid-template-columns: 1fr; }\n    }\n  </style>\n</head>\n<body>\n  <div class="container">\n    <h1>PolyPilot — Dark Dashboard</h1>\n\n    <div class="controls">\n      <div>\n        <label for="categoryFilter">Фильтр по категории</label>\n        <select id="categoryFilter">\n          <option value="all">Все категории</option>\n          <option value="Контент">Контент</option>\n          <option value="Продукт">Продукт</option>\n          <option value="Интеллект">Интеллект</option>\n          <option value="Техника">Техника</option>\n        </select>\n      </div>\n      <div>\n        <label for="priorityFilter">Фильтр по приоритету</label>\n        <select id="priorityFilter">\n          <option value="all">Все приоритеты</option>\n          <option value="высокий">Высокий</option>\n          <option value="средний">Средний</option>\n          <option value="низкий">Низкий</option>\n        </select>\n      </div>\n    </div>\n\n    <div class="new-task">\n      <div>\n        <label for="taskTitle">Задача</label>\n        <input id="taskTitle" placeholder="Введите задачу" />\n      </div>\n      <div>\n        <label for="taskCategory">Категория</label>\n        <select id="taskCategory">\n          <option value="Контент">Контент</option>\n          <option value="Продукт">Продукт</option>\n          <option value="Интеллект">Интеллект</option>\n          <option value="Техника">Техника</option>\n        </select>\n      </div>\n      <div>\n        <label for="taskPriority">Приоритет</label>\n        <select id="taskPriority">\n          <option value="высокий">Высокий</option>\n          <option value="средний" selected>Средний</option>\n          <option value="низкий">Низкий</option>\n        </select>\n      </div>\n      <div>\n        <label for="taskColumn">Колонка</label>\n        <select id="taskColumn">\n          <option value="Сегодня">Сегодня</option>\n          <option value="Неделя">Неделя</option>\n          <option value="Когда-нибудь потом">Когда-нибудь потом</option>\n        </select>\n      </div>\n      <div class="add-btn" style="align-self:end;">\n        <button id="addTaskBtn">Добавить</button>\n      </div>\n    </div>\n\n    <div class="board" id="board"></div>\n  </div>\n\n  <script>\n    const STORAGE_KEY = 'polypilot-dashboard-v1';\n    const COLUMNS = ['Сегодня', 'Неделя', 'Когда-нибудь потом'];\n\n    const starterTasks = [\n      { title: 'сделать 1 ролик', category: 'Контент', priority: 'высокий', done: false, column: 'Сегодня' },\n      { title: 'изучить 1 событие Polymarket', category: 'Интеллект', priority: 'средний', done: false, column: 'Неделя' },\n      { title: 'добавить идею в MVP dashboard', category: 'Продукт', priority: 'высокий', done: false, column: 'Сегодня' },\n      { title: '30 минут изучения AI', category: 'Интеллект', priority: 'средний', done: false, column: 'Неделя' },\n      { title: 'опубликовать пост в Telegram', category: 'Контент', priority: 'низкий', done: false, column: 'Когда-нибудь потом' }\n    ];\n\n    const boardEl = document.getElementById('board');\n    const categoryFilterEl = document.getElementById('categoryFilter');\n    const priorityFilterEl = document.getElementById('priorityFilter');\n\n    let tasks = loadTasks();\n\n    function loadTasks() {\n      const saved = localStorage.getItem(STORAGE_KEY);\n      if (!saved) {\n        const initial = starterTasks.map((task) => ({ ...task, id: crypto.randomUUID() }));\n        localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));\n        return initial;\n      }\n      try {\n        return JSON.parse(saved);\n      } catch {\n        return [];\n      }\n    }\n\n    function saveTasks() {\n      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));\n    }\n\n    function addTask() {\n      const title = document.getElementById('taskTitle').value.trim();\n      const category = document.getElementById('taskCategory').value;\n      const priority = document.getElementById('taskPriority').value;\n      const column = document.getElementById('taskColumn').value;\n\n      if (!title) return;\n\n      tasks.unshift({ id: crypto.randomUUID(), title, category, priority, done: false, column });\n      saveTasks();\n      render();\n      document.getElementById('taskTitle').value = '';\n    }\n\n    function deleteTask(id) {\n      tasks = tasks.filter(task => task.id !== id);\n      saveTasks();\n      render();\n    }\n\n    function toggleTask(id) {\n      tasks = tasks.map(task => task.id === id ? { ...task, done: !task.done } : task);\n      saveTasks();\n      render();\n    }\n\n    function filterTasks(list) {\n      const categoryFilter = categoryFilterEl.value;\n      const priorityFilter = priorityFilterEl.value;\n      return list.filter(task => {\n        const categoryOk = categoryFilter === 'all' || task.category === categoryFilter;\n        const priorityOk = priorityFilter === 'all' || task.priority === priorityFilter;\n        return categoryOk && priorityOk;\n      });\n    }\n\n    function render() {\n      boardEl.innerHTML = '';\n      const visible = filterTasks(tasks);\n\n      COLUMNS.forEach((columnName) => {\n        const column = document.createElement('section');\n        column.className = 'column';\n\n        const title = document.createElement('h2');\n        title.textContent = columnName;\n        column.appendChild(title);\n\n        const taskList = document.createElement('div');\n        taskList.className = 'task-list';\n\n        const columnTasks = visible.filter(task => task.column === columnName);\n\n        if (!columnTasks.length) {\n          const empty = document.createElement('div');\n          empty.className = 'empty';\n          empty.textContent = 'Нет задач';\n          taskList.appendChild(empty);\n        }\n\n        columnTasks.forEach((task) => {\n          const card = document.createElement('article');\n          card.className = `task-card ${task.done ? 'task-done' : ''}`;\n\n          card.innerHTML = `\n            <p class="task-title">${task.title}</p>\n            <div class="meta">\n              <span class="badge">${task.category}</span>\n              <span class="badge">${task.priority}</span>\n            </div>\n            <div class="actions">\n              <label><input type="checkbox" data-action="toggle" data-id="${task.id}" ${task.done ? 'checked' : ''}> готово</label>\n              <button class="delete-btn" data-action="delete" data-id="${task.id}">Удалить</button>\n            </div>\n          `;\n\n          taskList.appendChild(card);\n        });\n\n        column.appendChild(taskList);\n        boardEl.appendChild(column);\n      });\n    }\n\n    document.getElementById('addTaskBtn').addEventListener('click', addTask);\n    document.getElementById('taskTitle').addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });\n    categoryFilterEl.addEventListener('change', render);\n    priorityFilterEl.addEventListener('change', render);\n\n    boardEl.addEventListener('click', (e) => {\n      const action = e.target.dataset.action;\n      const id = e.target.dataset.id;\n      if (!action || !id) return;\n      if (action === 'delete') deleteTask(id);\n    });\n\n    boardEl.addEventListener('change', (e) => {\n      if (e.target.dataset.action === 'toggle') toggleTask(e.target.dataset.id);\n    });\n\n    render();\n  </script>\n</body>\n</html>
